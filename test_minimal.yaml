name: "Clarity Minimal Test"
version: 1
author: "Marcel Rienks"

steps:
  # Basic System Startup Test
  - name: "Boot and initialize system"
    delay: 3000ms
  
  - name: "Wait for system ready"
    wait-serial: "..."

  # Splash Screen Loading Test
  - name: "Wait for splash panel to load"
    wait-serial: "SplashPanel"
    
  - name: "Wait for splash screen duration"
    delay: 3000ms
    
  - name: "Wait for main panel transition"
    wait-serial: "OemOilPanel"

  # Simple sensor test
  - name: "Set oil pressure (50%)"
    set-control:
      part-id: pot1
      control: value
      value: 0.5
  
  - name: "Wait for sensor reading"
    delay: 2000ms
  
  # Simple trigger test
  - name: "Key Present trigger ON"
    set-control:
      part-id: sw1
      control: "1"
      value: 1
  
  - name: "Wait for Key panel"
    wait-serial: "KeyPanel"
    
  - name: "Key Present trigger OFF"
    set-control:
      part-id: sw1
      control: "1"
      value: 0
  
  - name: "Wait for restoration"
    delay: 5000ms
    
  - name: "Final stability check"
    delay: 2000ms