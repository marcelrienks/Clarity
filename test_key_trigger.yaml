name: "Key Trigger Tests"
version: 1
author: "Marcel Rienks"

steps:
  - name: "Boot and initialize system"
    delay: 3000ms
  
  - name: "Wait for system ready"
    wait-serial: "system_ready"

  - name: "Wait for main panel"
    wait-serial: "OemOilPanel"

  # Test Key Present trigger
  - name: "Key Present trigger ON"
    set-control:
      part-id: sw1
      control: "1"
      value: 1
  
  - name: "Wait and verify Key panel loading"
    wait-serial: "KeyPanel"
    
  - name: "Key Present trigger OFF"
    set-control:
      part-id: sw1
      control: "1"
      value: 0
  
  - name: "Wait for restoration"
    delay: 5000ms
    
  - name: "Verify oil panel restored"
    wait-serial: "OemOilPanel"

  # Test Key Not Present trigger
  - name: "Key Not Present trigger ON"
    set-control:
      part-id: sw1
      control: "2"
      value: 1
  
  - name: "Wait and verify Key panel loading"
    wait-serial: "KeyPanel"
    
  - name: "Key Not Present trigger OFF"
    set-control:
      part-id: sw1
      control: "2"
      value: 0
  
  - name: "Wait for restoration"
    delay: 5000ms
    
  - name: "Verify oil panel restored"
    wait-serial: "OemOilPanel"

  - name: "Final stability check"
    delay: 2000ms