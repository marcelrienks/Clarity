name: "Trigger Priority Tests"
version: 1
author: "Marcel Rienks"

steps:
  - name: "Boot and initialize system"
    delay: 3000ms
  
  - name: "Wait for system ready"
    wait-serial: "system_ready"

  - name: "Wait for main panel"
    wait-serial: "OemOilPanel"

  # Test priority: Lock first, then Key Present override
  - name: "Activate Lock trigger first"
    set-control:
      part-id: sw1
      control: "3"
      value: 1
  
  - name: "Wait for Lock panel to load"
    wait-serial: "LockPanel"
    
  - name: "Activate Key Present (should override Lock)"
    set-control:
      part-id: sw1
      control: "1"
      value: 1
  
  - name: "Wait and verify Key panel overrides Lock panel"
    wait-serial: "KeyPanel"
    
  - name: "Deactivate Key Present"
    set-control:
      part-id: sw1
      control: "1"
      value: 0
    
  - name: "Should return to Lock panel"
    wait-serial: "LockPanel"
    
  - name: "Deactivate Lock trigger"
    set-control:
      part-id: sw1
      control: "3"
      value: 0

  - name: "Wait for oil panel restoration"
    delay: 5000ms
    
  - name: "Verify oil panel restored"
    wait-serial: "OemOilPanel"

  - name: "Final stability check"
    delay: 2000ms